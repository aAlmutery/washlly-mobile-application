name: Build iOS IPA

on:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-13  # macos-14+ (M1) breaks CocoaPods 1.15.x Ruby environment
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.27.1 ~/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v 1.15.2

      - name: Install pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
